<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильмотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light"> <div class="container mt-5">
        <h1 class="text-center mb-5 text-warning fw-bold">🍿 Мой Онлайн-Кинотеатр</h1>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for movie in movies %}
                <div class="col">
                    <div class="card h-100 bg-secondary text-light border-0 shadow">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold text-warning">{{ movie.title }}</h5>
                            <h6 class="card-subtitle mb-2 text-dark">Год выпуска: {{ movie.release_year }}</h6>
                            <p class="card-text text-truncate">{{ movie.description }}</p>
                            
                            <a href="{% url 'movie_detail' movie.pk %}" class="btn btn-warning mt-auto fw-bold">Подробнее</a>
                        </div>
                    </div>
                </div>
            {% empty %}
                <div class="col-12 text-center">
                    <p class="fs-4 text-muted">Фильмов пока нет в базе данных. Добавь их через админку!</p>
                </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
